version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: case-studies-postgres
    environment:
      POSTGRES_DB: case_studies_react
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - case_studies_pgdata:/var/lib/postgresql/data
volumes:
  case_studies_pgdata:
